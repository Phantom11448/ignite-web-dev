<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizCheck</title>
  <link rel="manifest" href="/bizcheck/manifest.json" />
  <meta name="theme-color" content="#1b1f27" />
  <link rel="stylesheet" href="/bizcheck/css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>BizCheck</h1>
    <nav class="app-nav">
      <!-- Screen links — each screen's markup/logic gets built later and
           loaded into #app-content. Data layer for all of these already
           exists in /js (jobs.js, expenses.js, labor.js, categories.js,
           dashboard.js). -->
      <button data-screen="jobs">Jobs</button>
      <button data-screen="bulletin">Bulletin Board</button>
      <button data-screen="categories">Categories</button>
      <button data-screen="team">Team</button>
      <button data-screen="dashboard">Dashboard</button>
      <button data-screen="billing">Billing</button>
      <button id="logout-btn">Log Out</button>
    </nav>
  </header>

  <div id="checkout-banner" class="checkout-banner" hidden></div>
  <div id="trial-banner" class="trial-banner" hidden></div>

  <main id="app-content">
    <!-- Screen content is injected here per data-screen selection.
         No screens are implemented yet — this is scaffolding only. -->
    <p class="placeholder">Select a screen above.</p>
  </main>

  <script type="module" src="/bizcheck/js/firebase-config.js"></script>
  <script type="module">
    import { observeAuthState, logOut, getUserProfile, getBusinessIdForUser } from "/bizcheck/js/auth.js";
    import { getBusiness } from "/bizcheck/js/billing.js";
    import { renderJobsScreen } from "/bizcheck/js/screens/jobs-screen.js";
    import { renderBulletinScreen } from "/bizcheck/js/screens/bulletin-screen.js";
    import { renderCategoriesScreen } from "/bizcheck/js/screens/categories-screen.js";
    import { renderJobDetailScreen } from "/bizcheck/js/screens/job-detail-screen.js";
    import { renderDashboardScreen } from "/bizcheck/js/screens/dashboard-screen.js";
    import { renderTeamScreen } from "/bizcheck/js/screens/team-screen.js";
    import { renderBillingScreen } from "/bizcheck/js/screens/billing-screen.js";
    import { renderLockedOutScreen } from "/bizcheck/js/screens/locked-out-screen.js";

    const contentEl = document.getElementById("app-content");
    const navScreenButtons = document.querySelectorAll("[data-screen]");
    const categoriesNavBtn = document.querySelector('[data-screen="categories"]');
    const dashboardNavBtn = document.querySelector('[data-screen="dashboard"]');
    const teamNavBtn = document.querySelector('[data-screen="team"]');
    const billingNavBtn = document.querySelector('[data-screen="billing"]');
    const trialBannerEl = document.getElementById("trial-banner");
    let currentUser = null;
    let currentRole = null;
    let currentUserName = null;
    let currentBusinessId = null;
    let currentBusiness = null;
    let currentHasAccess = true;

    const TRIAL_DAYS = 30;
    const TRIAL_MS = TRIAL_DAYS * 24 * 60 * 60 * 1000;

    // Mirrors firestore.rules' hasActiveAccess()/isInTrial() exactly — a
    // business has access if its subscription is active, OR it's still
    // within 30 days of created_at. This is a UX convenience only: the
    // rules are the real enforcement, this just keeps the UI from showing
    // screens whose reads would fail anyway. Keep this in sync by hand if
    // the rules version ever changes — there's no shared source between
    // the two languages.
    //
    // Note: this compares against the CLIENT's clock, while the rules
    // compare against request.time (the server's clock) — a small clock
    // skew between the two is expected and harmless here, since the rules
    // are what actually decides whether a read/write succeeds either way.
    function hasActiveAccess(business) {
      if (!business) return false;
      if (business.subscription_status === "active") return true;
      const createdAt = business.created_at;
      if (!createdAt) return false; // fail closed if somehow missing
      const createdAtMs =
        typeof createdAt.toDate === "function" ? createdAt.toDate().getTime() : new Date(createdAt).getTime();
      return Date.now() < createdAtMs + TRIAL_MS;
    }

    // Shows a one-time banner after a Stripe Checkout redirect lands back
    // here (see billing.js's createCheckoutSession and the success_url/
    // cancel_url in netlify/functions/bizcheck-create-checkout-session.js),
    // then strips the query param so a page refresh doesn't show it again.
    // Runs immediately on script load — doesn't need to wait for auth,
    // since it's just reading the URL.
    (function showCheckoutBanner() {
      const params = new URLSearchParams(window.location.search);
      const checkout = params.get("checkout");
      if (!checkout) return;

      const banner = document.getElementById("checkout-banner");
      if (checkout === "success") {
        banner.textContent = "Subscription active — thanks for subscribing!";
        banner.className = "checkout-banner checkout-banner-success";
        banner.hidden = false;
      } else if (checkout === "cancelled") {
        banner.textContent = "Checkout cancelled — no changes were made.";
        banner.className = "checkout-banner checkout-banner-cancelled";
        banner.hidden = false;
      }

      params.delete("checkout");
      const newSearch = params.toString();
      const newUrl = window.location.pathname + (newSearch ? `?${newSearch}` : "") + window.location.hash;
      window.history.replaceState({}, "", newUrl);
    })();

    // Guard: bounce unauthenticated visitors back to the login page.
    observeAuthState(async (user) => {
      if (!user) {
        window.location.href = "/bizcheck/index.html";
        return;
      }
      currentUser = user;

      // Every account (owner, supervisor, crew) has a user_business_map
      // entry written at creation time — this is the real way to find
      // which business a logged-in user belongs to. Do not assume
      // uid === businessId; that's only true for owners by coincidence.
      currentBusinessId = await getBusinessIdForUser(currentUser.uid);
      if (!currentBusinessId) {
        // No business mapping found for this account — nothing to show.
        await logOut();
        window.location.href = "/bizcheck/index.html";
        return;
      }

      const profile = await getUserProfile(currentBusinessId, currentUser.uid);
      currentRole = profile?.role || "crew"; // fail closed: unknown role gets least access
      // Denormalized onto every bulletin post at creation time — falls back
      // to email, then a placeholder, in case a profile has no name set.
      currentUserName = profile?.name || currentUser.email || "Unknown";

      // businesses/{businessId} itself is never access-gated (see
      // firestore.rules) specifically so this read always works, even for
      // a locked-out business — it's what makes the locked-out screen
      // possible to show at all.
      currentBusiness = await getBusiness(currentBusinessId);
      currentHasAccess = hasActiveAccess(currentBusiness);

      applyNavVisibility(currentRole, currentHasAccess);
      updateTrialBanner(currentBusiness, currentRole, currentHasAccess);
      showScreen("jobs"); // land on Jobs after login (or the locked-out screen, if access is denied)
    });

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await logOut();
      window.location.href = "/bizcheck/index.html";
    });

    document.querySelectorAll("[data-screen]").forEach((btn) => {
      btn.addEventListener("click", () => showScreen(btn.dataset.screen));
    });

    // Categories management is supervisor/owner only; the profit Dashboard
    // is owner-only. Crew never sees either nav item. When the business
    // has no active access (trial expired, not subscribed), EVERY nav
    // button gets hidden except Log Out — there's nothing behind any of
    // them to show, and showScreen() below renders the locked-out screen
    // no matter which one gets clicked anyway, but hiding them is clearer
    // than leaving dead buttons around.
    function applyNavVisibility(role, hasAccess) {
      if (!hasAccess) {
        navScreenButtons.forEach((btn) => (btn.hidden = true));
        return;
      }
      navScreenButtons.forEach((btn) => (btn.hidden = false));
      categoriesNavBtn.hidden = role === "crew";
      dashboardNavBtn.hidden = role !== "owner";
      teamNavBtn.hidden = role !== "owner";
      billingNavBtn.hidden = role !== "owner";
    }

    // Trial-countdown warning banner — a lighter-weight heads-up shown for
    // the final week of the trial, before the full locked-out screen (see
    // renderLockedOutScreen above) takes over once the trial actually
    // expires. Only relevant while NOT subscribed — an active subscription
    // never sees this regardless of how old the business is. Visible on
    // every screen (lives outside #app-content, right below the nav), and
    // stays up for as long as the underlying condition is true — unlike
    // the checkout banner above, this isn't a one-time/URL-triggered
    // message, so it isn't stripped or dismissed on its own.
    function updateTrialBanner(business, role, hasAccess) {
      trialBannerEl.innerHTML = "";
      trialBannerEl.hidden = true;

      // hasAccess already mirrors this same 30-day math (see
      // hasActiveAccess above) — once it's false, the locked-out screen is
      // showing instead, and this banner has nothing useful to add.
      if (!business || !hasAccess || business.subscription_status === "active") return;
      if (!business.created_at) return;

      const trialEnd = new Date(
        business.created_at.toDate ? business.created_at.toDate() : business.created_at
      );
      trialEnd.setDate(trialEnd.getDate() + 30);
      const daysRemaining = Math.ceil((trialEnd - new Date()) / (1000 * 60 * 60 * 24));

      if (!(daysRemaining > 0 && daysRemaining <= 7)) return;

      const dayWord = daysRemaining === 1 ? "day" : "days";

      if (role === "owner") {
        const message = document.createElement("span");
        message.textContent = `Your free trial ends in ${daysRemaining} ${dayWord}.`;
        const actionBtn = document.createElement("button");
        actionBtn.type = "button";
        actionBtn.className = "link-btn";
        actionBtn.textContent = "Subscribe to keep access →";
        actionBtn.addEventListener("click", () => showScreen("billing"));
        trialBannerEl.appendChild(message);
        trialBannerEl.appendChild(actionBtn);
      } else {
        trialBannerEl.textContent = `This business's free trial ends in ${daysRemaining} ${dayWord}. Contact the account owner to subscribe.`;
      }

      trialBannerEl.hidden = false;
    }

    function showScreen(screen) {
      if (!currentUser || !currentBusinessId) return;
      const businessId = currentBusinessId;

      if (!currentHasAccess) {
        // Overrides normal routing entirely — no matter which nav item
        // was clicked (or none, on initial load), a locked-out business
        // only ever sees this. firestore.rules blocks the underlying
        // reads/writes regardless; this just avoids showing a screen
        // that would immediately fail anyway.
        renderLockedOutScreen(contentEl, {
          businessId,
          role: currentRole,
          userEmail: currentUser.email,
          subscriptionStatus: currentBusiness?.subscription_status || null,
        });
        return;
      }

      if (screen === "jobs") {
        showJobsList(businessId);
      } else if (screen === "bulletin") {
        // Open to every role — no gate here, unlike the branches below.
        renderBulletinScreen(contentEl, {
          businessId,
          userId: currentUser.uid,
          userName: currentUserName,
          role: currentRole,
        });
      } else if (screen === "categories" && currentRole !== "crew") {
        renderCategoriesScreen(contentEl, { businessId, role: currentRole });
      } else if (screen === "dashboard" && currentRole === "owner") {
        renderDashboardScreen(contentEl, { businessId });
      } else if (screen === "team" && currentRole === "owner") {
        renderTeamScreen(contentEl, { businessId });
      } else if (screen === "billing" && currentRole === "owner") {
        renderBillingScreen(contentEl, { businessId, userEmail: currentUser.email });
      } else if (screen === "categories" || screen === "dashboard" || screen === "team" || screen === "billing") {
        // Role changed since page load, or someone bypassed the hidden nav
        // button — Firestore rules still block the underlying reads/writes,
        // this is just the UI-side message.
        contentEl.innerHTML = `<p class="placeholder">You don't have access to this screen.</p>`;
      } else {
        contentEl.innerHTML = `<p class="placeholder">"${screen}" screen not built yet.</p>`;
      }
    }

    function showJobsList(businessId) {
      renderJobsScreen(contentEl, {
        businessId,
        userId: currentUser.uid,
        role: currentRole,
        onSelectJob: (jobId) => showJobDetail(businessId, jobId),
      });
    }

    function showJobDetail(businessId, jobId) {
      renderJobDetailScreen(contentEl, {
        businessId,
        jobId,
        userId: currentUser.uid,
        role: currentRole,
        onBack: () => showJobsList(businessId),
      });
    }
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/bizcheck/service-worker.js", { scope: "/bizcheck/" });
      });
    }
  </script>
</body>
</html>
